name: 02 CI with Matrix and Build

on:
  workflow_dispatch:

jobs:

  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check Python version
        run: python --version

  build:
    runs-on: ubuntu-latest
    needs: ci   # 👈 دي بتخليها تستنى الـ ci يخلص
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build artifact
        run: |
          mkdir build
          echo "Hello from build job" > build/output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: build/
