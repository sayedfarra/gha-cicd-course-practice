name: 02 CI Workflow

on:
  schedule:
    - cron: '25 10 * * *' 
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(env.PYTHON_MATRIX) }}
    env:
      # قيم الـ secrets بصيغة JSON array
      PYTHON_MATRIX: ${{ toJSON([ secrets.SECRET1, secrets.SECRET2 ]) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix }}
          
      - name: Show Python version
        run: python --version
        
      - name: List repository files
        run: ls -la
        
      - name: Show runner time
        run: date

      - name: Run tests
        run: python -m unittest discover -s tests -v
