# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:

  schedule:
    - cron: '25 10 * * *' 
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.11"]  # حط النسخ اللي عايزها
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Show Python version
        run: python --version
        
      - name: List repository files
        run: ls -la
        
      - name: Show runner time
        run: date

      - name: Run tests
        run: python -m unittest discover -s tests -v

✅ ده هينفذ job مرتين: مرة بـ Python 3.12 ومرة بـ Python 3.11 (أو أي نسخ تحددها).
