name: 04 Deploy Workflow

on:
  workflow_run:
    workflows: ["03 Build Artifact Workflow"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy-package:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: tiny-health-app
      CONTAINER_NAME: tiny-health-container
      PORT: 8000
      BASE_IMAGE: python:3.12-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BASE_IMAGE=$BASE_IMAGE \
            -t $IMAGE_NAME:run-${{ github.event.workflow_run.run_number }} .

      - name: Show Docker images
        run: docker images

      - name: Start container
        run: |
          docker run -d \
            --name $CONTAINER_NAME \
            -p $PORT:$PORT \
            "$IMAGE_NAME:run-${{ github.event.workflow_run.run_number }}"

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:$PORT/health; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f $CONTAINER_NAME || true
